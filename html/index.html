        </div>
        <p class="auth-subtitle">Organize your tasks, simplify your life</p>
      </div>

      <div class="auth-card">
        <div class="auth-tabs">
          <button class="auth-tab active" data-tab="login">Sign In</button>
          <button class="auth-tab" data-tab="register">Create Account</button>
        </div>

        <div id="auth-message" class="auth-message"></div>

        <!-- Login Form -->
        <form id="login-form" class="auth-form active" autocomplete="off">
          <div class="form-group">
            <label class="form-label" for="login-email">Email</label>
            <input class="form-input" type="email" id="login-email" placeholder="you@example.com" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="login-password">Password</label>
            <input class="form-input" type="password" id="login-password" placeholder="Enter your password" required>
          </div>
          <button type="submit" class="btn btn-primary" id="login-btn">Sign In</button>
        </form>

        <!-- Register Form -->
        <form id="register-form" class="auth-form" autocomplete="off">
          <div class="form-group">
            <label class="form-label" for="register-name">Full Name</label>
            <input class="form-input" type="text" id="register-name" placeholder="John Doe" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="register-email">Email</label>
            <input class="form-input" type="email" id="register-email" placeholder="you@example.com" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="register-password">Password</label>
            <input class="form-input" type="password" id="register-password" placeholder="At least 6 characters"
              required minlength="6">
          </div>
          <div class="form-group">
            <label class="form-label" for="register-confirm">Confirm Password</label>
            <input class="form-input" type="password" id="register-confirm" placeholder="Confirm your password"
              required>
          </div>
          <button type="submit" class="btn btn-primary" id="register-btn">Create Account</button>
        </form>
      </div>
    </div>

  <script src="/js/auth.js"></script>

</html>
